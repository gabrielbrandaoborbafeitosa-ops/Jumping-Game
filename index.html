<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jumping Game</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link rel="shortcut icon" href="player192.png" type="image/x-icon">
</head>
<body>
    <button onclick="musicadefundo()">Ativar música de fundo</button> <br>
    <button onclick="telacheia()" id="botaotelacheia">Entrar ou sair do modo de tela cheia</button>
    <img src="player.png" alt="Jogador" id="player">
    <img src="matar.png" alt="Matar" id="matar" style="transform: translateX(20vh) translateY(15vh)">
    <img src="matar.png" alt="Matar" id="matar2" style="transform: translateX(70vh) translateY(15vh)">
    <img src="matar.png" alt="Matar" id="matar3" style="transform: translateX(120vh) translateY(15vh)">
    <img src="matar.png" alt="Matar" id="matar4" style="transform: translateX(160vh) translateY(15vh)">
    <img src="matar.png" alt="Matar" id="matar5" style="transform: translateX(200vh) translateY(15vh)">
    <script src="script.js"></script>
    <script>if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js")
    .then(() => console.log("Service Worker registrado!"))
    .catch(err => console.error(err));
}</script>
</body>
</html>
